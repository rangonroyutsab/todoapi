{% extends 'base.html' %}

{% block content %}
<div class="card auth-card">
    <h2 class="mb-md">Register</h2>
    
    <form method="POST">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label class="label-caps" for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <span class="error-text">{{ field.errors.0 }}</span>
            {% endif %}
            {% if field.help_text %}
                <span class="help-text">{{ field.help_text }}</span>
            {% endif %}
        </div>
        {% endfor %}
        
        <button type="submit" class="btn-primary btn-block">Create Account</button>
    </form>
    
    <p class="auth-links">
        Already have an account? <a href="{% url 'login' %}" class="link-primary">Login here</a>
    </p>
</div>
{% endblock %}
